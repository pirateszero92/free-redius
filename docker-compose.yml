services:
  postgres:
    image: postgres:16-alpine
    container_name: freeradius-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radius}
      POSTGRES_USER: ${POSTGRES_USER:-radius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radius_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - radius-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radius} -d ${POSTGRES_DB:-radius}"]
      interval: 10s
      timeout: 5s
      retries: 5

  freeradius:
    build:
      context: ./freeradius
      dockerfile: Dockerfile
    container_name: freeradius-server
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-radius}
      POSTGRES_USER: ${POSTGRES_USER:-radius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radius_secret}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - radius-net
    volumes:
      - freeradius_logs:/var/log/freeradius
      - /var/lib/samba/winbindd_privileged:/var/lib/samba/winbindd_privileged
      - /etc/samba/smb.conf:/etc/samba/smb.conf:ro

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: freeradius-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-radius}
      POSTGRES_USER: ${POSTGRES_USER:-radius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radius_secret}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@1234}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - radius-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  nginx:
    image: nginx:1.25-alpine
    container_name: freeradius-nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - radius-net

volumes:
  postgres_data:
  freeradius_logs:

networks:
  radius-net:
    driver: bridge
